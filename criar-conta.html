<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Farmácia</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #f4f6f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        .login-card { background: #ffffff; padding: 40px 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 420px; border: 1px solid #f0f0f0; display: block; }
        .success-card { background: #ffffff; padding: 40px 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 420px; border: 1px solid #f0f0f0; text-align: center; display: none; }
        .success-card.active { display: block; }
        .login-card.hidden { display: none; }

        .success-card h2 { color: #1b5e20; margin-bottom: 15px; }
        .success-card p { color: #555; margin-bottom: 10px; font-size: 0.95rem; line-height: 1.5; }
        .success-card .email-destaque { background: #f0fdf4; border: 1px solid #bbf7d0; padding: 15px; border-radius: 8px; color: #166534; font-weight: 700; margin: 20px 0; word-break: break-all; }
        .btn-ok { display: inline-block; padding: 12px 30px; background: #1b5e20; color: white; border: none; border-radius: 8px; font-weight: 700; font-size: 1rem; cursor: pointer; text-decoration: none; transition: 0.2s; margin-top: 10px; }
        .btn-ok:hover { background: #388E3C; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.9rem; color: #555; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 12px 15px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 1rem; outline: none; transition: border 0.2s; }
        .form-group input:focus { border-color: #388E3C; }
        
        .terms { display: flex; align-items: flex-start; gap: 10px; margin: 20px 0; }
        .terms input { margin-top: 3px; width: 18px; height: 18px; accent-color: #1b5e20; cursor: pointer; }
        .terms label { font-size: 0.85rem; color: #333; line-height: 1.4; }
        .terms label a { color: #1b5e20; text-decoration: none; }
        .terms label a:hover { text-decoration: underline; }

        .btn-primary { width: 100%; padding: 12px; background: #1b5e20; color: white; border: none; border-radius: 8px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.2s; }
        .btn-primary:hover { background: #388E3C; }

        .btn-back { display: block; text-align: center; margin-top: 15px; color: #1b5e20; text-decoration: none; font-size: 0.9rem; font-weight: 600; }
        .btn-back:hover { text-decoration: underline; }

        @media (max-width: 480px) { .login-card { padding: 25px 15px; } }
    </style>
</head>
<body>

    <div class="login-card" id="formCard">
        <h1>Bem-vindo</h1>
        <h2>Crie sua conta</h2>

        <div class="form-group">
            <label>Nome Completo</label>
            <input type="text" id="inputNome" placeholder="Digite seu nome">
        </div>
        <div class="form-group">
            <label>E-mail</label>
            <input type="email" id="inputEmail" placeholder="Digite seu e-mail">
        </div>
        <div class="form-group">
            <label>WhatsApp (com DDD)</label>
            <input type="text" id="inputTelefone" placeholder="(47) 99999-9999" maxlength="15" oninput="mascaraTelefone(this)">
        </div>
        <div class="form-group">
            <label>Senha</label>
            <input type="password" id="inputPassword" placeholder="Crie uma senha segura">
        </div>

        <div class="terms">
            <input type="checkbox" id="termsCheck">
            <label for="termsCheck">Li e concordo com a <a href="#">Política de Privacidade</a> e com a <a href="#">Política de Troca e Devolução</a>.</label>
        </div>

        <button class="btn-primary" onclick="criarConta()">Criar sua conta</button>
        
        <a href="login.html" class="btn-back">Já tenho uma conta, fazer login</a>
    </div>

    <div class="success-card" id="successCard">
        <h2>📧 Verifique seu e-mail</h2>
        <p>Enviamos um link de confirmação para o e-mail abaixo. Clique no link para ativar sua conta e poder fazer o login.</p>
        <div class="email-destaque" id="emailDisplay">email@exemplo.com</div>
        <p style="font-size: 0.85rem; color: #888;">Após confirmar, volte aqui e faça o login.</p>
        <a href="login.html" class="btn-ok">Ir para o Login</a>
    </div>

    <script>
        const SUPABASE_URL = 'https://ibpmlpebfwdyuondosca.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_tkr3tvS9SK7IzpqLIUzjdA_7rAXAUfe';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function mascaraTelefone(input) {
            let valor = input.value.replace(/\D/g, '');
            if (valor.length > 11) valor = valor.slice(0, 11);
            if (valor.length <= 10) {
                input.value = valor.replace(/^(\d{2})(\d{4})(\d{4})$/, '($1) $2-$3');
            } else {
                input.value = valor.replace(/^(\d{2})(\d{5})(\d{4})$/, '($1) $2-$3');
            }
        }

        async function criarConta() {
            const nome = document.getElementById('inputNome').value.trim();
            const email = document.getElementById('inputEmail').value.trim();
            const telefone = document.getElementById('inputTelefone').value.trim();
            const senha = document.getElementById('inputPassword').value.trim();
            const terms = document.getElementById('termsCheck').checked;

            if(!nome || !email || !telefone || !senha) {
                alert('Por favor, preencha todos os campos obrigatórios.');
                return;
            }
            if(!terms) {
                alert('Você precisa aceitar os termos para criar a conta.');
                return;
            }

            try {
                const { error: checkError } = await supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin
                });

                if (checkError && checkError.message !== "User not found") {
                    throw new Error("Este e-mail já está cadastrado em outra conta. Tente fazer login ou recuperar sua senha.");
                }

                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: senha,
                    options: { data: { nome_completo: nome, telefone: telefone } }
                });

                if (error) {
                    throw new Error(error.message);
                }

                if (!data.user) {
                    throw new Error('Erro desconhecido ao criar usuário.');
                }

                const perfilResponse = await fetch(`${SUPABASE_URL}/rest/v1/clientes`, {
                    method: 'POST',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
                    body: JSON.stringify({ id: data.user.id, nome_completo: nome, telefone: telefone })
                });

                if (!perfilResponse.ok) {
                    console.error('Erro ao salvar perfil.', await perfilResponse.text());
                    alert('Conta criada, mas houve um erro ao salvar seus dados adicionais. Entre em contato com o suporte.');
                }

                document.getElementById('formCard').classList.add('hidden');
                document.getElementById('successCard').classList.add('active');
                document.getElementById('emailDisplay').innerText = email;

            } catch (error) {
                alert('Erro: ' + error.message);
                console.error(error);
            }
        }
    </script>
</body>
</html>
