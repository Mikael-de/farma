<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Farmácia</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #f4f6f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        .login-card {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 420px;
            border: 1px solid #f0f0f0;
        }

        .login-card h1 {
            text-align: center;
            color: #1b5e20;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .login-card h2 {
            text-align: center;
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.9rem; color: #555; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 12px 15px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 1rem; outline: none; transition: border 0.2s; }
        .form-group input:focus { border-color: #388E3C; }
        
        .terms { display: flex; align-items: flex-start; gap: 10px; margin: 20px 0; }
        .terms input { margin-top: 3px; width: 18px; height: 18px; accent-color: #1b5e20; cursor: pointer; }
        .terms label { font-size: 0.85rem; color: #333; line-height: 1.4; }
        .terms label a { color: #1b5e20; text-decoration: none; }
        .terms label a:hover { text-decoration: underline; }

        .btn-primary {
            width: 100%; padding: 12px;
            background: #1b5e20; color: white; border: none; border-radius: 8px;
            font-weight: 700; font-size: 1rem; cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary:hover { background: #388E3C; }

        .btn-back {
            display: block; text-align: center; margin-top: 15px;
            color: #1b5e20; text-decoration: none; font-size: 0.9rem; font-weight: 600;
        }
        .btn-back:hover { text-decoration: underline; }

        @media (max-width: 480px) { .login-card { padding: 25px 15px; } }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>Bem-vindo</h1>
        <h2>Crie sua conta</h2>

        <div class="form-group">
            <label>Nome Completo</label>
            <input type="text" id="inputNome" placeholder="Digite seu nome">
        </div>
        <div class="form-group">
            <label>E-mail</label>
            <input type="email" id="inputEmail" placeholder="Digite seu e-mail">
        </div>
        <div class="form-group">
            <label>WhatsApp (com DDD)</label>
            <input type="text" id="inputTelefone" placeholder="(47) 99999-9999" maxlength="15" oninput="mascaraTelefone(this)">
        </div>
        <div class="form-group">
            <label>Senha</label>
            <input type="password" id="inputPassword" placeholder="Crie uma senha segura">
        </div>

        <div class="terms">
            <input type="checkbox" id="termsCheck">
            <label for="termsCheck">Li e concordo com a <a href="#">Política de Privacidade</a> e com a <a href="#">Política de Troca e Devolução</a>.</label>
        </div>

        <button class="btn-primary" onclick="criarConta()">Criar sua conta</button>
        
        <a href="login.html" class="btn-back">Já tenho uma conta, fazer login</a>
    </div>

    <script>
        const SUPABASE_URL = 'https://ibpmlpebfwdyuondosca.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_tkr3tvS9SK7IzpqLIUzjdA_7rAXAUfe';

        function mascaraTelefone(input) {
            let valor = input.value.replace(/\D/g, '');
            if (valor.length > 11) valor = valor.slice(0, 11);
            if (valor.length <= 10) {
                input.value = valor.replace(/^(\d{2})(\d{4})(\d{4})$/, '($1) $2-$3');
            } else {
                input.value = valor.replace(/^(\d{2})(\d{5})(\d{4})$/, '($1) $2-$3');
            }
        }

        async function criarConta() {
            const nome = document.getElementById('inputNome').value.trim();
            const email = document.getElementById('inputEmail').value.trim();
            const telefone = document.getElementById('inputTelefone').value.trim();
            const senha = document.getElementById('inputPassword').value.trim();
            const terms = document.getElementById('termsCheck').checked;

            if(!nome || !email || !telefone || !senha) {
                alert('Por favor, preencha todos os campos obrigatórios.');
                return;
            }
            if(!terms) {
                alert('Você precisa aceitar os termos para criar a conta.');
                return;
            }

            try {
                const authResponse = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
                    method: 'POST',
                    headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password: senha })
                });
                
                const authData = await authResponse.json();

                // Diagnóstico: Exibe o erro completo no console do navegador (Aperte F12 para ver)
                if (!authResponse.ok) {
                    console.error("Erro completo do Supabase:", authData);
                    // Lança o erro que o Supabase devolveu
                    throw new Error(authData.message || authData.error_description || 'Erro desconhecido ao criar usuário.');
                }

                const perfilResponse = await fetch(`${SUPABASE_URL}/rest/v1/clientes`, {
                    method: 'POST',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
                    body: JSON.stringify({
                        id: authData.user.id,
                        nome_completo: nome,
                        telefone: telefone
                    })
                });

                if (!perfilResponse.ok) {
                    console.error('Erro ao salvar perfil.', await perfilResponse.text());
                    alert('Conta criada, mas houve um erro ao salvar seus dados. Tente editar depois em "Meus Dados".');
                } else {
                    alert('Conta criada com sucesso! Faça o login.');
                    window.location.href = 'login.html';
                }

            } catch (error) {
                alert('Erro: ' + error.message);
                console.error(error);
            }
        }
    </script>
</body>
</html>
