<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identificação - Farmácia</title>
    
    <!-- Fontes e Estilos base -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- ⚡ Importação do CSS do Auth UI (MUITO IMPORTANTE) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@supabase/auth-ui@0.2.18/dist/umd/auth-ui.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #f4f6f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        .login-card {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 420px;
            border: 1px solid #f0f0f0;
        }

        .login-card h1 {
            text-align: center;
            color: #1b5e20;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .login-card h2 {
            text-align: center;
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 25px;
            font-weight: 600;
        }

        /* Estilização customizada para o Auth UI do Supabase (opcional, mas deixa mais bonito) */
        :root {
            --auth-ui-primary-color: #1b5e20;
            --auth-ui-border-radius: 8px;
            --auth-ui-font-family: 'Poppins', sans-serif;
        }
        
        .auth-container {
            width: 100%;
        }

        /* Esconde o formulário de email/senha se quiser apenas o Google (opcional) */
        /* .supabase-auth-ui_ui-container { display: none; } */
    </style>
</head>
<body>

    <div class="login-card">
        <h1>Identificação</h1>
        <h2>Entre com sua conta</h2>

        <!-- ⚡ AQUI É ONDE O BOTÃO DO GOOGLE VAI APARECER MAGICAMENTE -->
        <div id="auth-container" class="auth-container"></div>

        <div class="separator" style="display: flex; align-items: center; text-align: center; margin: 25px 0; color: #999; font-size: 0.9rem;">
            <span style="padding: 0 10px;">Ainda não é cliente?</span>
        </div>
        <button class="btn-primary" onclick="window.location.href='criar-conta.html'" style="width: 100%; padding: 12px; background: #1b5e20; color: white; border: none; border-radius: 8px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.2s;">Crie sua conta</button>
    </div>

    <!-- ⚡ Importação da biblioteca Auth UI do Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/auth-ui@0.2.18/dist/umd/auth-ui.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>

    <script>
        // =========================================
        //  CONFIGURAÇÃO DO SUPABASE
        // =========================================
        const SUPABASE_URL = 'https://ibpmlpebfwdyuondosca.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_tkr3tvS9SK7IzpqLIUzjdA_7rAXAUfe';

        // Inicializa o cliente do Supabase
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // =========================================
        //  CONFIGURAÇÃO E RENDERIZAÇÃO DO AUTH UI
        // =========================================
        const authUi = window.AuthUI;

        // Aqui é onde o mágica acontece. O Auth UI cria o formulário de login e o botão do Google
        authUi.create({
            container: document.getElementById('auth-container'), // O ID da div onde ficará o formulário
            supabaseClient: supabase,
            options: {
                providers: ['google'], // Ativa o login com Google
                theme: 'light',        // Tema claro
                showLabels: true,
                redirectTo: window.location.origin, // Após o login, volta para a raiz do site (Netlify)
                // O 'redirectTo' vai levar o usuário para o index.html após logar.
                // Lá no index.html, vamos detectar que ele está logado e mandar para a área da conta.
                style: {
                    button: {
                        background: '#ffffff',
                        color: '#333333',
                        border: '1px solid #d1d5db',
                        borderRadius: '8px',
                        fontWeight: '600',
                        padding: '12px'
                    },
                    input: {
                        borderRadius: '8px'
                    }
                }
            }
        });

        // =========================================
        //  OUVINTE DE AUTENTICAÇÃO (REDIRECIONAMENTO)
        // =========================================
        // O Supabase avisa quando o usuário loga com sucesso.
        // Quando isso acontecer, nós salvamos os dados e mandamos para a área do cliente.
        supabase.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN' && session) {
                // Salva os dados do usuário logado no navegador
                localStorage.setItem('cliente_logado', JSON.stringify(session.user));
                
                // Redireciona direto para a minha-conta.html
                window.location.href = 'minha-conta.html';
            }
        });
    </script>
</body>
</html>
